description: >-
  RudderStack's billing surface is a tier-based monthly subscription metered primarily on monthly tracked events. Free (250K events) is gratis; Starter is a flat $220/month including 1M events; Growth and Enterprise are custom-quoted committed-volume contracts. Reverse ETL connections, Profiles, and Python Transformations gate higher tiers. Hidden adjacent costs include the customer-owned data warehouse compute used by Profiles and Reverse ETL, and the egress traffic to downstream SaaS destinations.
notes: >-
  Reconciled against published RudderStack pricing on 2026-05-08. RudderStack does not currently expose a public FOCUS-formatted billing feed; usage and invoice data is available through the Dashboard, monthly invoices, and (for Enterprise) custom usage exports. Self-hosted (open-source) deployments do not generate RudderStack invoices but do incur infrastructure cost in the operator's cloud.
