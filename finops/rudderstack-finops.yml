meters:
  - name: tracked_events
    description: Events ingested via Event Stream (identify, track, page, screen, group, alias) and counted toward the plan's monthly quota.
    unit: event
    aggregation: sum
    dimensions:
      - workspace
      - source
      - event_type
  - name: reverse_etl_rows
    description: Rows synced through Reverse ETL pipelines.
    unit: row
    aggregation: sum
    dimensions:
      - workspace
      - source
      - destination
      - model
  - name: profiles_runs
    description: Profiles model executions (identity stitching, feature compute, audience materialization).
    unit: run
    aggregation: sum
    dimensions:
      - workspace
      - project
      - model
  - name: transformation_invocations
    description: Transformation function invocations (JS or Python) on the streaming pipeline.
    unit: invocation
    aggregation: sum
    dimensions:
      - workspace
      - destination
      - language
  - name: connections_active
    description: Active source-to-destination connections (caps vary by tier).
    unit: connection-month
    aggregation: max
    dimensions:
      - workspace
      - source
      - destination
principles:
  - name: Visibility
    description: >-
      Pull the monthly invoice and Dashboard usage report. Track event-volume burn-down vs plan quota; on Enterprise, request a scheduled usage export feeding your cost-allocation pipeline. Account for warehouse compute consumed by Profiles and Reverse ETL inside your warehouse provider's bill, not the RudderStack invoice.
  - name: Allocation
    description: >-
      Use one workspace per business unit (or use source-level tagging) to attribute event volume back to product surfaces. Allocate Reverse ETL rows by destination owner.
  - name: Optimization
    description: >-
      Suppress noisy events at the SDK and via Tracking Plan validation; right-size Reverse ETL sync frequency; archive rarely used connections; consolidate shadow workspaces; renegotiate at renewal once stable volume is known.
  - name: Accountability
    description: >-
      Assign a workspace owner; alert on month-to-date events at 70/85/95% of plan; review forecast monthly with the contract owner ahead of renewal.
